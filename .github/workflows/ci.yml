name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: swift test
      - name: Validate release assets and Homebrew rendering
        run: ./Scripts/check_release_artifacts.sh
