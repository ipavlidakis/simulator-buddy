name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0 or v0.1.0)"
        required: true
        type: string
      changelog:
        description: "Optional changelog text for the GitHub release notes"
        required: false
        type: string

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift version
        run: swift --version

      - name: Resolve release version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_INPUT="${{ github.event.inputs.version }}"
          else
            VERSION_INPUT="${GITHUB_REF_NAME}"
          fi

          VERSION="${VERSION_INPUT#v}"
          RELEASE_TAG="v${VERSION}"

          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Build archives
        run: |
          set -euo pipefail
          mkdir -p dist

          for ARCH in arm64 x86_64; do
            swift build -c release --arch "${ARCH}" --product simulator-buddy

            case "${ARCH}" in
              arm64)
                BUILD_TRIPLE="arm64-apple-macosx"
                ARCHIVE_NAME="simulator-buddy-aarch64-apple-darwin.tar.gz"
                ;;
              x86_64)
                BUILD_TRIPLE="x86_64-apple-macosx"
                ARCHIVE_NAME="simulator-buddy-x86_64-apple-darwin.tar.gz"
                ;;
            esac

            STAGE_DIR="$(mktemp -d)"
            cp ".build/${BUILD_TRIPLE}/release/simulator-buddy" "${STAGE_DIR}/simulator-buddy"
            tar -C "${STAGE_DIR}" -czf "dist/${ARCHIVE_NAME}" simulator-buddy
          done

          shasum -a 256 dist/simulator-buddy-*.tar.gz > dist/checksums.txt

          ./Scripts/render_homebrew_formula.sh \
            --version "${VERSION}" \
            --repo ipavlidakis/simulator-buddy \
            --checksums-file dist/checksums.txt \
            > dist/simulator-buddy.rb

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANGELOG: ${{ github.event.inputs.changelog || '' }}
        run: |
          RELEASE_NOTES_FILE="$(mktemp)"
          ./Scripts/write_release_notes.sh \
            --output-path "${RELEASE_NOTES_FILE}" \
            --notes "${RELEASE_CHANGELOG:-}"

          ASSETS=(
            dist/simulator-buddy-aarch64-apple-darwin.tar.gz
            dist/simulator-buddy-x86_64-apple-darwin.tar.gz
            dist/checksums.txt
            dist/simulator-buddy.rb
          )

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSETS[@]}" --clobber
            EDIT_ARGS=(
              "${RELEASE_TAG}"
              --title "${RELEASE_TAG}"
            )

            if [[ -f "${RELEASE_NOTES_FILE}" ]]; then
              EDIT_ARGS+=(--notes-file "${RELEASE_NOTES_FILE}")
            fi

            gh release edit "${EDIT_ARGS[@]}"
          else
            RELEASE_ARGS=(
              "${RELEASE_TAG}"
              "${ASSETS[@]}"
              --title "${RELEASE_TAG}"
            )

            if [[ -f "${RELEASE_NOTES_FILE}" ]]; then
              RELEASE_ARGS+=(--notes-file "${RELEASE_NOTES_FILE}")
            else
              RELEASE_ARGS+=(--generate-notes)
            fi

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              RELEASE_ARGS+=(--target "${GITHUB_SHA}")
            fi

            gh release create "${RELEASE_ARGS[@]}"
          fi

      - name: Publish Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          ./Scripts/publish_homebrew_formula.sh \
            --tap-repository ipavlidakis/homebrew-tap \
            --formula-path dist/simulator-buddy.rb \
            --release-version "${VERSION}" \
            --formula-name simulator-buddy
